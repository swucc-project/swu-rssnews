user nginx nginx;
worker_processes auto;
error_log /var/log/nginx/error.log;
pid /run/nginx.pid;

# Load dynamic modules. See /usr/share/nginx/README.dynamic.
include /usr/share/nginx/modules/*.conf;

events {
    worker_connections 1024;
}

http {
    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.$host.log  main;

    # Compression config
    gzip on;
    gzip_min_length 1000;
    gzip_buffers 4 32k;
    gzip_proxied any;
    gzip_types text/plain application/javascript application/x-javascript text/javascript text/xml text/css application/json application/rss+xml application/graphql application/grpc+proto;
    gzip_vary on;
    gzip_disable "MSIE [1-6]\.(?!.*SV1)";

    sendfile            on;
    tcp_nopush          on;
    tcp_nodelay         on;
    keepalive_timeout   65;
    types_hash_max_size 2048;
    include             /etc/nginx/mime.types;

    proxy_cache_path /var/cache/nginx/ssr
                     levels=1:2
                     keys_zone=ssr_cache:10m
                     max_size=100m
                     inactive=60m
                     use_temp_path=off;
    
    include             /etc/nginx/conf.d/*.conf;
    default_type        application/octet-stream;
}