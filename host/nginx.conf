user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log;
pid /run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    # ✅ Docker DNS Resolver
    resolver 127.0.0.11 valid=30s;
    resolver_timeout 5s;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;
    types_hash_max_size 2048;

    # ✅ Gzip Compression (ครอบคลุม gRPC/GraphQL)
    gzip on;
    gzip_disable "msie6";
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript application/graphql application/grpc-web-text;

    # ✅ Connection Upgrade Map (สำหรับ WebSocket/HMR)
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # ✅ CORS Map สำหรับ Development
    map $http_origin $cors_dev_origin {
        default "";
        "~^http://localhost(:[0-9]+)?$" $http_origin;
        "~^http://127.0.0.1(:[0-9]+)?$" $http_origin;
    }

    # รวม Config จากโฟลเดอร์ conf.d
    include /etc/nginx/conf.d/*.conf;
}