# ═══════════════════════════════════════════════════════════
# ✅ Optimized Production Nginx Configuration
# ═══════════════════════════════════════════════════════════

upstream backend {
    server aspdotnetweb:5000;
    keepalive 32;
}

limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=graphql_limit:10m rate=20r/s;

map $http_origin $cors_origin {
    default "";
    "~^https://news\.swu\.ac\.th$" $http_origin;
    "~^https://.*\.swu\.ac\.th$" $http_origin;
}

server {
    listen 80;
    server_name news.swu.ac.th;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    http2   on;
    server_name news.swu.ac.th;

    ssl_certificate /etc/nginx/ssl/rssnews/fullchain.crt;
    ssl_certificate_key /etc/nginx/ssl/rssnews/cert.key;
    
    # [Security Headers]
    add_header Strict-Transport-Security "max-age=63072000" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Content-Security-Policy "default-src 'self' https: data: blob: 'unsafe-inline' 'unsafe-eval'; connect-src 'self' https://news.swu.ac.th wss://news.swu.ac.th" always;

    client_max_body_size 50M; # ปรับเพิ่มสำหรับงาน Production
    root /var/www/rssnews/wwwroot;
    index index.html;

    # ✅ Health Checks (Keep it simple)
    location ~ ^/(health|nginx-health) {
        proxy_pass http://backend;
        access_log off;
    }

    # ✅ Backend APIs, Auth, and RSS Routes (Inertia support)
    location ~ ^/(api|auth|rss|swagger|usermanual) {
        limit_req zone=api_limit burst=20 nodelay;
        
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # สำหรับ Inertia.js และ Cookie Auth
        proxy_set_header X-Inertia $http_x_inertia;
        add_header Access-Control-Allow-Origin $cors_origin always;
        add_header Access-Control-Allow-Credentials true always;
    }

    # ✅ gRPC-Web
    location /grpc/ {
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin $cors_origin always;
            add_header Access-Control-Allow-Credentials true always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Grpc-Web, X-User-Agent, Grpc-Timeout, Accept" always;
            add_header Access-Control-Expose-Headers "Grpc-Status, Grpc-Message" always;
            return 204;
        }
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header X-Grpc-Web "1";
        proxy_buffering off;
        add_header Access-Control-Allow-Origin $cors_origin always;
    }

    # ✅ GraphQL & WebSockets
    location /graphql {
        limit_req zone=graphql_limit burst=50 nodelay;
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade; # ต้องมี map ใน nginx.conf
        proxy_set_header Host $host;
        
        add_header Access-Control-Allow-Origin $cors_origin always;
        add_header Access-Control-Allow-Credentials true always;
    }

    # ✅ Static Files & Caching
    location /volume/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri @backend;
    }

    # ✅ SPA Fallback
    location / {
        try_files $uri @backend;
    }

    location @backend {
        proxy_pass http://backend;
        proxy_set_header Host $host;
    }
}