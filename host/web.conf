# Upstream definitions
upstream backend {
    server aspdotnetweb:5000;
    keepalive 32;
}

upstream vite-composite {
    server frontend:13714;
}

upstream ssr-server {
    server frontend:13714;
    keepalive 16;
    keepalive_requests 100;
    keepalive_timeout 60s;
}

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=graphql_limit:10m rate=20r/s;

# HTTP to HTTPS redirect (Development)
server {
    listen 80;
    server_name _;
    
    add_header  Access-Control-Allow-Origin "*" always;
    add_header  Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
    add_header  Access-Control-Allow-Headers "Authorization, Content-Type, X-Requested-With" always;
    
    if ($request_method = OPTIONS) {
        return 204;
    }

    client_max_body_size    20M;

    access_log          /var/log/nginx/dev.access.log main;
    error_log           /var/log/nginx/dev.error.log warn;

    root                /var/www/rssnews/wwwroot;
    index               index.html;

    # Static files
    location /volume/ {
        alias           /var/www/rssnews/wwwroot/volume/;
        expires         1h;
        add_header      Cache-Control "public";
    }

    location /api/ {
        proxy_pass          http://backend;
        proxy_http_version  1.1;
        proxy_set_header    Host $host;
        proxy_set_header    X-Real-IP $remote_addr;
        proxy_set_header    X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;
    }

    # GraphQL
    location /graphql {
        proxy_pass          http://backend;
        proxy_http_version  1.1;
        proxy_set_header    Upgrade $http_upgrade;
        proxy_set_header    Connection "upgrade";
        proxy_set_header    Host $host;
        proxy_buffering     off;
    }

    # GraphQL WebSocket
    location /graphql-ws {
        proxy_pass          http://backend;
        proxy_http_version  1.1;
        proxy_set_header    Upgrade $http_upgrade;
        proxy_set_header    Connection "upgrade";
        proxy_set_header    Host $host;
        proxy_read_timeout  3600s;
    }

    # Health check
    location /health {
        proxy_pass          http://backend;
        access_log          off;
    }

    # Swagger
    location /swagger {
        proxy_pass          http://backend;
        proxy_set_header    Host $host;
    }

    # SSR render endpoint
    location /ssr/render {
        proxy_pass http://ssr-server/render;
        proxy_http_version 1.1;
        
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Content-Type application/json;
        
        proxy_connect_timeout 5s;
        proxy_send_timeout 10s;
        proxy_read_timeout 10s;
        
        proxy_buffering off;
        proxy_cache_bypass $http_upgrade;
        
        # Error handling
        proxy_intercept_errors on;
        error_page 502 503 504 = @ssr_fallback;
    }
    
    # SSR health check
    location /ssr/health {
        proxy_pass http://ssr-server/health;
        access_log off;
    }
    
    # SSR fallback
    location @ssr_fallback {
        default_type application/json;
        return 200 '{"html":"","success":false,"error":"SSR server unavailable"}';
    }

    # Main application
    location / {
        proxy_pass          http://backend;
        proxy_http_version  1.1;
        proxy_set_header    Host $host;
        proxy_set_header    X-Real-IP $remote_addr;
        proxy_set_header    X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}

# HTTPS Server (Production)
server {
    listen              443 ssl;
    http2               on;
    server_name         news.swu.ac.th;
    
    # SSL Configuration
    ssl_certificate     /etc/nginx/ssl/rssnews/rss.crt;
    ssl_certificate_key /etc/nginx/ssl/rssnews/private.key;
    ssl_dhparam         /etc/nginx/ssl/rssnews/encryption.pem;
    
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;
    
    # Security Headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    
    # Client settings
    client_max_body_size 20M;
    client_body_timeout 60s;
    
    # Logging
    access_log /var/log/nginx/rssnews.access.log main;
    error_log  /var/log/nginx/rssnews.error.log warn;
    
    # Root directory
    root /var/www/rssnews/wwwroot;
    index index.html;
    
    # Static files (Vite build output)
    location /volume/ {
        alias /var/www/rssnews/wwwroot/volume/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
    
    location /css/ {
        alias /var/www/rssnews/wwwroot/volume/css/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
    
    location /fonts/ {
        alias /var/www/rssnews/wwwroot/volume/fonts/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
    
    location /images/ {
        alias /var/www/rssnews/wwwroot/volume/images/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location = /feed.xml {
        alias       /var/www/rssnews/wwwroot/feed.xml;
        expires     1h;
        add_header  Cache-Control "public, must-revalidate";
    }
    
    # API endpoints
    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;
        
        proxy_pass http://backend;
        proxy_http_version 1.1;
        
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        
        proxy_buffering off;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
    }
    
    # GraphQL endpoint
    location /graphql {
        limit_req zone=graphql_limit burst=30 nodelay;
        
        proxy_pass http://backend;
        proxy_http_version 1.1;
        
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        proxy_buffering off;
        proxy_read_timeout 300s;
    }
    
    # GraphQL WebSocket
    location /graphql-ws {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
    
    # gRPC endpoint
    location /grpc/ {
        grpc_pass grpc://backend;
        
        grpc_set_header Host $host;
        grpc_set_header X-Real-IP $remote_addr;
        grpc_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        grpc_set_header X-Forwarded-Proto $scheme;
        
        grpc_read_timeout 300s;
        grpc_send_timeout 300s;
    }
    
    # Health check
    location /health {
        proxy_pass http://backend;
        access_log off;
        return 200 "OK";
    }
    
    # Swagger UI
    location /swagger {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    # SSR render endpoint
    location /ssr/render {
        limit_req zone=api_limit burst=10 nodelay;
        
        proxy_pass http://ssr-server/render;
        proxy_http_version 1.1;
        
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Content-Type application/json;
        
        proxy_connect_timeout 5s;
        proxy_send_timeout 10s;
        proxy_read_timeout 10s;
        
        proxy_buffering off;
        
        # Caching for successful renders
        proxy_cache ssr_cache;
        proxy_cache_key "$scheme$request_method$host$request_uri$request_body";
        proxy_cache_valid 200 1m;
        proxy_cache_methods POST;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        
        add_header X-Cache-Status $upstream_cache_status;
        
        proxy_intercept_errors on;
        error_page 502 503 504 = @ssr_fallback;
    }
    
    location @ssr_fallback {
        default_type application/json;
        return 200 '{"html":"","success":false,"error":"SSR unavailable","fallback":true}';
    }
    
    # Main application (ASP.NET Core)
    location / {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        
        proxy_buffering off;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 300s;
    }
    
    # Error pages
    error_page 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
        internal;
    }
}