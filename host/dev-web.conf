# ═══════════════════════════════════════════════════════════
# Development Nginx Configuration
# ═══════════════════════════════════════════════════════════

upstream backend {
    server aspdotnetweb:5000;
    keepalive 32;
}

server {
    listen 80;
    server_name localhost;

    resolver 127.0.0.11 valid=10s ipv6=off;

    set $vite_upstream http://frontend:5173;

    client_max_body_size 20M;

    # =============================
    # VITE DEV SERVER (assets + HMR)
    # =============================
    location ^~ /@vite/ {
        proxy_pass $vite_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location ^~ /__vite_hmr {
        proxy_pass $vite_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location ~ ^/(@fs|@id|node_modules|src|hub|apollo)/ {
        proxy_pass $vite_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|map)$ {
        proxy_pass $vite_upstream;
        proxy_http_version 1.1;
    }

    # =============================
    # EVERYTHING ELSE → BACKEND
    # =============================
    location / {
        proxy_pass http://backend;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_buffering off;
        proxy_read_timeout 300s;
    }
}

server {
    listen 443 ssl;
    server_name localhost;

    ssl_certificate         /etc/nginx/ssl/rssnews/rss.crt;
    ssl_certificate_key     /etc/nginx/ssl/rssnews/private.key;

    resolver 127.0.0.11 valid=10s ipv6=off;
    set $vite_upstream http://frontend:5173;
    client_max_body_size 20M;

    # Vite HMR / assets
    location ^~ /@vite/ {
        proxy_pass $vite_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location ^~ /__vite_hmr {
        proxy_pass $vite_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location ~ ^/(@fs|@id|node_modules|src|hub|apollo)/ {
        proxy_pass $vite_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|map)$ {
        proxy_pass $vite_upstream;
        proxy_http_version 1.1;
    }

    # ✅ Everything else → backend
    location / {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_read_timeout 300s;
    }
}