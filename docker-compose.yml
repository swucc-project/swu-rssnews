name: swu-rssnews

x-logging: &condition-logging
  logging:
    driver: "json-file"
    options:
      max-size: "10m"
      max-file: "3"

secrets:
  db_password:
    file: ./secrets/db_password.txt

services:
  # ASP.NET Core Backend
  aspdotnetweb:
    build:
      context: .
      dockerfile: ./aspnetcore/Dockerfile
      target: final
    container_name: aspnetcore
    hostname: aspdotnetweb
    <<: *condition-logging
    environment:
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT:-Development}
      - ASPNETCORE_URLS=http://+:5000
      - DATABASE_HOST=mssql
      - DATABASE_NAME=${DATABASE_NAME:-RSSActivityWeb}
      - MSSQL_SA_PASSWORD_FILE=/run/secrets/db_password
      - ADD_NEW_MIGRATION=${ADD_NEW_MIGRATION:-false}
      - MIGRATION_NAME=${MIGRATION_NAME}
      - TZ=Asia/Bangkok
      - LANG=th_TH.UTF-8
      - LC_ALL=th_TH.UTF-8
    secrets:
      - db_password
    expose:
      - "5000"
    ports:
      - "5000:5000"
    networks:
      - backend-network
      - database-network
    depends_on:
      mssql:
        condition: service_healthy
    env_file:
      - .env
    volumes:
      - ./aspnetcore:/app/aspnetcore:cached
      - dotnet-accessories:/root/.dotnet/tools
      - frontend-libraries:/var/www/rssnews/wwwroot
      - web-logs:/var/log/rssnews
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # Vite Frontend
  frontend:
    build:
      context: .
      dockerfile: ./vite-ui/Dockerfile
      target: development
    container_name: vite-user-interface
    hostname: frontend
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      # Server-side URLs
      - VITE_API_URL=http://aspdotnetweb:5000
      - VITE_GRAPHQL_ENDPOINT=http://aspdotnetweb:5000/graphql
      - VITE_GRAPHQL_WS_URL=ws://aspdotnetweb:5000/graphql-ws
      - VITE_GRPC_ENDPOINT=http://aspdotnetweb:5000/grpc
      # Client-side URLs
      - VITE_PUBLIC_API_URL=http://localhost:5000
      - VITE_PUBLIC_GRAPHQL_ENDPOINT=http://localhost:5000/graphql
      - VITE_PUBLIC_GRAPHQL_WS_URL=ws://localhost:5000/graphql-ws
      - VITE_PUBLIC_GRPC_ENDPOINT=http://localhost:5000/grpc
      # SSR Configuration
      - SSR_PORT=13714
      - TZ=Asia/Bangkok
    expose:
      - "5173"
      - "13714"
    networks:
      - vite-network
      - backend-network
    depends_on:
      aspdotnetweb:
        condition: service_healthy
    volumes:
      - ./vite-ui:/app:cached
      - nodejs-libraries:/app/node_modules
      - frontend-libraries:/app/wwwroot/volume
      - grpc-batch:/app/grpc-generated:rw
    restart: unless-stopped
    healthcheck:
      test: |
        curl -f http://localhost:5173 >/dev/null 2>&1 && \
        curl -f http://localhost:13714/health >/dev/null 2>&1 || exit 1
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

  # Nginx Web Server
  web-server:
    image: nginx:bookworm
    container_name: nginx
    hostname: web-server
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./host/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./host/web.conf:/etc/nginx/conf.d/default.conf:ro
      - ./ssl:/etc/nginx/ssl/rssnews:ro
      - frontend-libraries:/var/www/rssnews/wwwroot
      - grpc-batch:/var/www/rssnews/wwwroot/grpc:rw
      - nginx-logs:/var/log/nginx
    <<: *condition-logging
    networks:
      - vite-network
      - backend-network
    depends_on:
      - aspdotnetweb
      - frontend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

  # MS SQL Server Database
  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sqlserver
    hostname: mssql
    init: true
    privileged: true
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD_FILE=/run/secrets/db_password
      - MSSQL_PID=Express
      - MSSQL_AGENT_ENABLED=true
      - MSSQL_COLLATION=Thai_CI_AS
      - DATABASE_NAME=${DATABASE_NAME:-RSSActivityWeb}
      - MSSQL_TCP_PORT=1433
      - TZ=Asia/Bangkok
    secrets:
      - db_password
    volumes:
      - rssdata:/var/opt/mssql/data
      - db-backups:/var/opt/mssql/backups
      - rssdata-logs:/var/opt/mssql/log
    <<: *condition-logging
    stop_grace_period: 15s
    networks:
      - database-network
    ports:
      - "1433:1433"
    tmpfs:
      - /var/opt/mssql/tmp
    healthcheck:
      test: |
        /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "$$(cat /run/secrets/db_password)" -Q "SELECT 1" -C || exit 1
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  queue-db-migration:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: prepare-database
    depends_on:
      mssql:
        condition: service_healthy
    <<: *condition-logging
    networks:
      - database-network
    secrets:
      - db_password
    volumes:
      - ./database/setup.sql:/app/setup.sql:ro
      - ./database/wait-for-db.sh:/app/wait-for-db.sh:ro
    entrypoint: ["/bin/bash"]
    command:
      - -c
      - |
        set -e
        echo '⏳ Waiting for SQL Server to be fully ready...'
        sleep 15
        
        echo '🔍 Testing SQL Server connection...'
        PASSWORD=$$(cat /run/secrets/db_password)
        
        for i in {1..5}; do
          if /opt/mssql-tools18/bin/sqlcmd -S mssql -U sa -P "$$PASSWORD" -Q "SELECT 1" -C -b; then
            echo '✅ SQL Server is ready'
            break
          else
            echo "⚠️  Attempt $$i failed, retrying..."
            sleep 5
          fi
        done
        
        echo '🔍 Running database setup script...'
        if /opt/mssql-tools18/bin/sqlcmd -S mssql -U sa -P "$$PASSWORD" -i /app/setup.sql -C -b; then
          echo '✅ Database setup completed successfully'
          exit 0
        else
          echo '❌ Database setup failed'
          /opt/mssql-tools18/bin/sqlcmd -S mssql -U sa -P "$$PASSWORD" -i /app/setup.sql -C
          exit 1
        fi
    profiles:
      - setup

  # EF Core Migration Service
  migration-db:
    build:
      context: .
      dockerfile: ./aspnetcore/Dockerfile
      target: migration
    container_name: ef-migration-routine
    environment:
      - DATABASE_HOST=mssql
      - DATABASE_NAME=${DATABASE_NAME:-RSSActivityWeb}
      - MSSQL_SA_PASSWORD_FILE=/run/secrets/db_password
      - ADD_NEW_MIGRATION=true
      - MIGRATION_NAME=SWUNewsEvents
      - TZ=Asia/Bangkok
    <<: *condition-logging
    secrets:
      - db_password
    networks:
      - database-network
    depends_on:
      mssql:
        condition: service_healthy
    volumes:
      - ./aspnetcore/Migrations:/app/aspnetcore/Migrations
    profiles:
      - migration
    entrypoint: ["/usr/local/bin/add-migration.sh"] 

volumes:
  rssdata:
    external: true
    name: swu-rssnews_rssdata
  db-backups:
    external: true
    name: swu-rssnews_db-backups
  rssdata-logs:
    external: true
    name: swu-rssnews_rssdata-logs
  dotnet-accessories:
    driver: local
  web-logs:
    driver: local
  nodejs-libraries:
    driver: local
  frontend-libraries:
    driver: local
  grpc-batch:
    driver: local
  nginx-logs:
    driver: local

networks:
  vite-network:
    driver: bridge
  backend-network:
    driver: bridge
  database-network:
    driver: bridge