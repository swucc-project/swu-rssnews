name: swu-rssnews

x-logging: &condition-logging
  logging:
    driver: "json-file"
    options:
      max-size: "10m"
      max-file: "3"

secrets:
  db_password:
    file: ./secrets/db_password.txt

services:
  # ASP.NET Core Backend
  aspdotnetweb:
    build:
      context: .
      dockerfile: ./aspnetcore/Dockerfile
      target: final
    container_name: aspnetcore
    hostname: aspdotnetweb
    <<: *condition-logging
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:5000
      - ASPNETCORE_HTTP_PORTS=
      - ASPNETCORE_HTTPS_PORTS=
      - HTTP_PORTS=
      - DATABASE_HOST=mssql
      - DATABASE_NAME=${DATABASE_NAME:-RSSActivityWeb}
      - MSSQL_SA_PASSWORD_FILE=/run/secrets/db_password
      - ADD_NEW_MIGRATION=${ADD_NEW_MIGRATION:-false}
      - MIGRATION_NAME=${MIGRATION_NAME:-SWUNewsEvents}
      - APP_URL=${FRONTEND_URL:-${APP_URL:-http://localhost:8080}}
      - SCHEMA_VERSION=${SCHEMA_VERSION:-1.0.0}
      - EXPORT_SCHEMA_ON_STARTUP=true
      - SCHEMA_EXPORT_PATH=/app/apollo/schema.graphql
      - GraphQL__EnableIntrospection=${ENABLE_GRAPHQL_INTROSPECTION:-true}
      - GraphQL__EnablePlayground=${ENABLE_GRAPHQL_PLAYGROUND:-true}
      - GRPC_OUTPUT_DIR=/app/grpc-generated
      - TZ=Asia/Bangkok
      - LANG=en_US.UTF-8
      - LC_ALL=en_US.UTF-8
      - TERM=xterm
    secrets:
      - db_password
    expose:
      - "5000"
    networks:
      - backend-network
      - database-network
    depends_on:
      mssql:
        condition: service_healthy
    env_file:
      - .env
    volumes:
      - ./aspnetcore:/app/aspnetcore:cached
      - aspnetcore-binary:/app/aspnetcore/bin
      - aspnetcore-obj:/app/aspnetcore/obj
      - ./protobuf/rss.proto:/app/protobuf/rss.proto:ro
      - dotnet-accessories:/root/.dotnet/tools
      - frontend-libraries:/var/www/rssnews/wwwroot/volume
      - dataprotection-keys:/var/www/rssnews/.aspnet/DataProtection-Keys:rw
      - web-logs:/var/log/rssnews
      - graphql-schema:/app/apollo:rw
    tmpfs:
      - /tmp:size=512M,mode=1777
      - /var/tmp:size=256M,mode=1777
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:5000/health/ready"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  # Vite Frontend
  frontend:
    build:
      context: .
      dockerfile: ./vite-ui/Dockerfile
      target: base
    container_name: vite-user-interface
    hostname: frontend
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - VITE_DEV_SERVER_PORT=${VITE_DEV_SERVER_PORT:-5173}
      - VITE_API_URL=http://aspdotnetweb:5000
      - VITE_GRAPHQL_ENDPOINT=http://aspdotnetweb:5000/graphql
      - VITE_GRAPHQL_WS_URL=ws://aspdotnetweb:5000/graphql-ws
      - VITE_GRPC_ENDPOINT=http://aspdotnetweb:5000/grpc
      - VITE_APP_URL=${FRONTEND_URL:-${APP_URL:-http://localhost:8080}}
      - VITE_PROTO_PATH=/app/protobuf/rss.proto
      - GRPC_CODEGEN_OUTPUT=/app/grpc-generated
      - USE_LOCAL_SCHEMA=true
      - VALIDATE_SCHEMA=true
      - SCHEMA_VALIDATE_TIMEOUT=30
      - SKIP_GRAPHQL_CODEGEN=false
      - DEBUG_CODEGEN=false
      - CODEGEN_WATCH=false
      - WAIT_FOR_BACKEND=true
      - BACKEND_WAIT_TIMEOUT=300
      - GRAPHQL_WAIT_TIMEOUT=180
      - HEALTH_CHECK_RETRIES=3
      - STRICT_MODE=false
      - CONTINUE_ON_FAIL=true
      - FORCE_PLACEHOLDERS=false
      - VERBOSE=false
      - DEBUG=false
      - TZ=Asia/Bangkok
    expose:
      - "5173"
    ports:
      - "5173:5173"
    networks:
      - vite-network
      - backend-network
    depends_on:
      aspdotnetweb:
        condition: service_healthy
        restart: true
    volumes:
      - ./vite-ui:/app:cached
      - nodejs-libraries:/app/node_modules
      - frontend-libraries:/app/wwwroot/volume 
      - graphql-schema:/app/apollo:rw
      - ./protobuf:/app/protobuf:ro
      - graphql-generated:/app/apollo/generated:rw
      - grpc-batch:/app/grpc-generated:rw
    restart: unless-stopped
    healthcheck:
      test: |
        test -f /app/.ready && \
        curl -sf http://localhost:5173 >/dev/null 2>&1 || exit 1
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 120s   

  # Nginx Web Server
  web-server:
    image: nginx:alpine
    container_name: nginx
    hostname: web-server
    ports:
      - "8080:80"
      - "443:443"
    environment:
      - TZ=Asia/Bangkok
      - LANG=th_TH.UTF-8
      - LC_ALL=th_TH.UTF-8
    volumes:
      - ./host/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./host/dev-web.conf:/etc/nginx/conf.d/default.conf:ro
      - ./ssl:/etc/nginx/ssl/rssnews:ro
      - frontend-libraries:/var/www/rssnews/wwwroot/volume
      - grpc-batch:/var/www/rssnews/wwwroot/grpc:rw
      - nginx-logs:/var/log/nginx
    <<: *condition-logging
    networks:
      - vite-network
      - backend-network
    depends_on:
      aspdotnetweb:
        condition: service_healthy
      frontend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

  # ✅ MS SQL Server Database - IMPROVED VERSION
  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sqlserver
    hostname: mssql
    init: true
    privileged: false
    user: "10001:0"
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD_FILE=/run/secrets/db_password
      - MSSQL_PID=Express
      - MSSQL_AGENT_ENABLED=true
      - MSSQL_COLLATION=Thai_CI_AS
      - DATABASE_NAME=${DATABASE_NAME:-RSSActivityWeb}
      - MSSQL_TCP_PORT=1433
      # ✅ แยก paths ให้ชัดเจน
      - MSSQL_DATA_DIR=/var/opt/mssql/data
      - MSSQL_LOG_DIR=/var/opt/mssql/log
      - MSSQL_BACKUP_DIR=/var/opt/mssql/backups
      - MSSQL_MEMORY_LIMIT_MB=2048
      - TZ=Asia/Bangkok
    secrets:
      - db_password
    # ✅ แยก volumes ออกเป็น 3 ส่วนเพื่อ flexibility และ backup ง่าย
    volumes:
      # Data files (MDF, NDF)
      - mssql-data:/var/opt/mssql/data
      # Log files (LDF)
      - mssql-logs:/var/opt/mssql/log
      # Backup files
      - mssql-backups:/var/opt/mssql/backups
      # System databases และ configuration
      - mssql-system:/var/opt/mssql
    # ✅ tmpfs สำหรับ temporary files - ปรับ permissions
    tmpfs:
      - /tmp:uid=10001,gid=0,mode=1777,size=512M
      - /var/opt/mssql/tmp:uid=10001,gid=0,mode=1777,size=1G
    networks:
      - database-network
    ports:
      - "1433:1433"
    <<: *condition-logging
    # ✅ ปรับ health check ให้รอนานขึ้นและทำ retry มากขึ้น
    healthcheck:
      test: |
        /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "$$(cat /run/secrets/db_password)" -Q "SELECT 1" -C -b || exit 1
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 120s
    restart: unless-stopped

  queue-db-migration:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: prepare-database
    depends_on:
      mssql:
        condition: service_healthy
    <<: *condition-logging
    networks:
      - database-network
    secrets:
      - db_password
    volumes:
      - ./database/setup.sql:/app/setup.sql:ro
      - ./database/wait-for-db.sh:/app/wait-for-db.sh:ro
    entrypoint: ["/bin/bash"]
    command:
      - -c
      - |
        set -e
        echo '⏳ Waiting for SQL Server to be fully ready...'
        sleep 20
        
        echo '🔍 Testing SQL Server connection...'
        PASSWORD=$$(cat /run/secrets/db_password)
        
        for i in {1..10}; do
          if /opt/mssql-tools18/bin/sqlcmd -S mssql -U sa -P "$$PASSWORD" -Q "SELECT 1" -C -b; then
            echo '✅ SQL Server is ready'
            break
          else
            echo "⚠️  Attempt $$i failed, retrying..."
            sleep 5
          fi
        done
        
        echo '🔧 Running database setup script...'
        if /opt/mssql-tools18/bin/sqlcmd -S mssql -U sa -P "$$PASSWORD" -i /app/setup.sql -C -b; then
          echo '✅ Database setup completed successfully'
          exit 0
        else
          echo '❌ Database setup failed'
          /opt/mssql-tools18/bin/sqlcmd -S mssql -U sa -P "$$PASSWORD" -i /app/setup.sql -C
          exit 1
        fi
    profiles:
      - setup

  # EF Core Migration Service
  migration-db:
    build:
      context: .
      dockerfile: ./aspnetcore/Dockerfile
      target: migration
    container_name: ef-migration-routine
    environment:
      - DATABASE_HOST=mssql
      - DATABASE_NAME=${DATABASE_NAME:-RSSActivityWeb}
      - MSSQL_SA_PASSWORD_FILE=/run/secrets/db_password
      - ADD_NEW_MIGRATION=true
      - MIGRATION_NAME=${MIGRATION_NAME:-SWUNewsEvent}
      - TZ=Asia/Bangkok
      - LANG=en_US.UTF-8
      - LC_ALL=en_US.UTF-8
      - TERM=xterm
    <<: *condition-logging
    secrets:
      - db_password
    env_file:
      - .env
    networks:
      - database-network
    depends_on:
      mssql:
        condition: service_healthy
      queue-db-migration:
        condition: service_completed_successfully
        required: false
    volumes:
      - ./aspnetcore/Migrations:/app/aspnetcore/Migrations
      - dotnet-accessories:/root/.dotnet/tools
    profiles:
      - migration
      - setup
    entrypoint: ["/usr/local/bin/add-migration.sh"]

# volumes definition
volumes:
  # SQL Server volumes - แยกออกเป็น 4 ส่วน
  mssql-system:
    external: true
    name: swu-rssnews_mssql-system
  mssql-data:
    external: true
    name: swu-rssnews_mssql-data
  mssql-logs:
    external: true
    name: swu-rssnews_mssql-logs
  mssql-backups:
    external: true
    name: swu-rssnews_mssql-backups
  
  # Application volumes
  dotnet-accessories:
    driver: local
  aspnetcore-binary:
    driver: local
  aspnetcore-obj:
    driver: local
  web-logs:
    driver: local
  dataprotection-keys:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./aspnetcore/.aspnet/DataProtection-Keys
  graphql-schema:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./shared/graphql
  nodejs-libraries:
    driver: local
  frontend-libraries:
    driver: local
  grpc-batch:
    driver: local
  graphql-generated:
    driver: local
  nginx-logs:
    driver: local

networks:
  vite-network:
    driver: bridge
  backend-network:
    driver: bridge
  database-network:
    driver: bridge