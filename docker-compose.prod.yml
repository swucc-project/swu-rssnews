name: swu-rssnews

# ═══════════════════════════════════════════════════════════
# 🚀 PRODUCTION CONFIGURATION
# ═══════════════════════════════════════════════════════════
# Use: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# ═══════════════════════════════════════════════════════════

services:
  # ═══════════════════════════════════════════════════════════
  # 🎯 ASP.NET Core Backend - Production
  # ═══════════════════════════════════════════════════════════
  aspdotnetweb:
    environment:
      # Environment
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:5000
      
      # URLs
      - APP_URL=${FRONTEND_URL:-https://news.swu.ac.th}
      - FRONTEND_URL=${FRONTEND_URL:-https://news.swu.ac.th}
      
      # Security Settings (Production)
      - GraphQL__EnableIntrospection=false
      - GraphQL__EnablePlayground=false
      - ENABLE_GRAPHQL_INTROSPECTION=false
      
      # Migration (Disabled in Production)
      - ADD_NEW_MIGRATION=false
      - MIGRATION_NAME=
      
      # Logging (Production)
      - Logging__LogLevel__Default=Warning
      - Logging__LogLevel__Microsoft=Warning
      - Logging__LogLevel__Microsoft.AspNetCore=Warning
      
      # Kestrel
      - Kestrel__EnableGrpcWeb=true
    
    env_file:
      - .env.production
    
    # Production Health Check
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:5000/health/ready || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    
    # Production Deployment Configuration
    deploy:
      mode: replicated
      replicas: 2
      
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M
      
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 3
        window: 120s
      
      update_config:
        parallelism: 1
        delay: 15s
        failure_action: rollback
        monitor: 30s
        order: start-first
      
      rollback_config:
        parallelism: 1
        delay: 10s
        order: stop-first
      
      placement:
        max_replicas_per_node: 1
    
    restart: unless-stopped

  # ═══════════════════════════════════════════════════════════
  # ⚛️ Vite Frontend - Production (Static Build)
  # ═══════════════════════════════════════════════════════════
  frontend:
    build:
      context: .
      dockerfile: ./vite-ui/Dockerfile
      target: production
      args:
        - NODE_ENV=production
    
    environment:
      # Environment
      - NODE_ENV=production
      
      # Internal API URLs (Build Time - Container-to-Container)
      - VITE_API_URL=http://aspdotnetweb:5000
      - VITE_GRAPHQL_ENDPOINT=http://aspdotnetweb:5000/graphql
      - VITE_GRAPHQL_WS_URL=ws://aspdotnetweb:5000/graphql-ws
      - VITE_GRPC_ENDPOINT=http://aspdotnetweb:5000/grpc
      
      # Public API URLs (Runtime - Browser-facing)
      - VITE_PUBLIC_API_URL=https://news.swu.ac.th
      - VITE_PUBLIC_GRAPHQL_ENDPOINT=https://news.swu.ac.th/graphql
      # [BUG FIX #1] WebSocket สำหรับ Production ต้องใช้ wss:// ไม่ใช่ ws://
      # เดิมในไฟล์นี้ถูกต้องแล้ว แต่ขอ comment ย้ำให้ชัดเจน
      - VITE_PUBLIC_GRAPHQL_WS_URL=wss://news.swu.ac.th/graphql-ws
      - VITE_PUBLIC_GRPC_ENDPOINT=https://news.swu.ac.th/grpc
      
      # App Configuration
      - VITE_APP_URL=${FRONTEND_URL:-https://news.swu.ac.th}
      - VITE_APP_ENV=production
      
      # Timezone
      - TZ=Asia/Bangkok
    
    volumes:
      # Read-only volume for static assets
      - frontend-libraries:/app/wwwroot/volume:ro
    
    # [BUG FIX #2] health check ใน Production ควร check index.html ใน wwwroot
    # ไม่ใช่ /app/wwwroot/index.html เพราะ static build อาจ output ไปยัง path อื่น
    # ขึ้นอยู่กับ Dockerfile target=production
    # ควร check ว่า container พร้อมให้ nginx serve ได้แล้ว
    healthcheck:
      test: ["CMD-SHELL", "test -d /var/www/rssnews/wwwroot || test -f /app/wwwroot/index.html || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    
    # Production Deployment
    deploy:
      mode: replicated
      replicas: 2
      
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
      
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
    
    restart: unless-stopped

  # ═══════════════════════════════════════════════════════════
  # 🌐 Nginx Web Server - Production
  # ═══════════════════════════════════════════════════════════
  web-server:
    # [BUG FIX #3] Production Nginx ต้อง expose port 443 ด้วย
    # เดิมไม่มี ports section ใน prod override ทำให้ port 443 ไม่ถูก publish
    # (docker-compose.yml base มีแค่ 80 และ 443 แต่ถ้า override ไม่ระบุ ports อาจถูก merge ผิด)
    ports:
      - "80:80"
      - "443:443"

    volumes:
      - ./host/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./host/web.conf:/etc/nginx/conf.d/default.conf:ro
      - ./ssl:/etc/nginx/ssl/rssnews:ro
      - frontend-libraries:/var/www/rssnews/wwwroot:ro
      - grpc-batch:/var/www/rssnews/wwwroot/grpc:ro
      - nginx-logs:/var/log/nginx
    
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    
    deploy:
      mode: replicated
      replicas: 1
      
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.25'
          memory: 128M
      
      restart_policy:
        condition: on-failure
        delay: 5s
    
    restart: unless-stopped

  # ═══════════════════════════════════════════════════════════
  # 💾 SQL Server - Production
  # ═══════════════════════════════════════════════════════════
  mssql:
    environment:
      # Increased memory for production
      - MSSQL_MEMORY_LIMIT_MB=4096
    
    # [BUG FIX #4] Production ไม่ควร expose port 1433 ออกไปที่ host
    # database ควรเข้าถึงได้เฉพาะ internal network เท่านั้น
    # ลบ ports section ออกจาก production override
    
    healthcheck:
      test: |
        /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "$$(cat /run/secrets/db_password)" -Q "SELECT 1" -C -b || exit 1
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    
    deploy:
      mode: replicated
      replicas: 1
      
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
        reservations:
          cpus: '1.0'
          memory: 2G
      
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 3
      
      placement:
        constraints:
          - node.role == manager
    
    restart: unless-stopped