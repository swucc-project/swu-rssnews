fragment RssItemFields on RssItem {
  itemID
  title
  link
  description
  publishedDate
  category {
    categoryID
    categoryName
  }
  author {
    buasriID
    firstName
    lastName
  }
}

fragment CategoryFields on Category {
  categoryID
  categoryName
}

fragment AuthorFields on Author {
  buasriID
  firstName
  lastName
}